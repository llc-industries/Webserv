server {
    listen 8080 8081;
    host localhost;
    root www;
    index index.html;

    client_max_body_size 10000000; # 10Mo

    error_page 404 error_pages/404.html;
    error_page 405 error_pages/405.html;
    error_page 500 error_pages/500.html;

    location / {
        allow_methods GET;
        autoindex y;
    }

    location /upload {
        allow_methods GET POST DELETE;
        upload_store upload;
        autoindex y;
    }
}

server {
    listen 9090;
    host 127.0.0.1;
    root www;

    client_max_body_size 2147483647;

    location / {
        allow_methods GET POST;
        autoindex y;
    }

    location *.php {
        allow_methods GET POST;
        autoindex y;
    }

    location *.py {
        allow_methods GET POST;
        cgi_pass /usr/bin/python3;
        upload_store upload;
    }
}

server {
    listen 9999;
    host localhost;
    root www;

    location / {
        return 301 https://intra.42.fr/;
    }

    location /google {
        return 302 https://github.com;
    }

    location /github {
        return 301 https://github.com;
    }
}

server {
    listen 7777;
    host localhost;
    root www;

    client_max_body_size 10;

    location / {
        allow_methods GET;
    }
}
