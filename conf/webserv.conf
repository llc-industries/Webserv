# 8080 8081 -> Requetes classiques + POST
# 9090 -> Full CGI + POST
# 9999 -> Full redirections
# 7777 -> Full 413 (Body too big)
server {
    listen 8080 8081;
    host localhost;
    root www;
    index index8080.html;

    client_max_body_size 10000000; # 10Mo

    error_page 404 error_pages/404.html;
    error_page 405 error_pages/405.html;
    error_page 500 error_pages/500.html;

    location / {
        allow_methods GET;
        autoindex y;
    }

    location /upload {
        allow_methods GET POST DELETE;
        upload_store upload;
        autoindex y;
    }

    location /auto_on {
        allow_methods GET;
        autoindex y;
    }

    location /auto_off {
        allow_methods GET;
        autoindex n;
    }

    location *.php {
        allow_methods GET POST;
        autoindex y;
        cgi_pass /usr/bin/php-cgi;
    }

    location *.py {
        allow_methods GET POST;
        cgi_pass /usr/bin/python3;
        upload_store upload;
    }
}

server {
    listen 9090;
    host 127.0.0.1;
    root www;
    index index9090.html;

    client_max_body_size 2147483647;

    location / {
        allow_methods GET POST;
        autoindex y;
    }

    location *.php {
        allow_methods GET POST;
        autoindex y;
        cgi_pass /usr/bin/php-cgi;
    }

    location *.py {
        allow_methods GET POST;
        cgi_pass /usr/bin/python3;
        upload_store upload;
    }
}

server {
    listen 9999;
    host localhost;
    root www;
    index index9999.html;

    location /google {
        return 302 https://google.com;
    }

    location /github {
        return 301 https://github.com;
    }
}

server {
    listen 7777;
    host localhost;
    index index7777.html;
    root www;

    client_max_body_size 10;

    location / {
        allow_methods GET;
    }
}
