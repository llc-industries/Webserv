server {
    listen 8080;
    host localhost;

    root www;
    error_page 404 error_pages/404.html;
    client_max_body_size 2147483647;

      location / {
        allow_methods GET POST DELETE;
        autoindex y;
    }

    # CGI PHP Python
    location *.php {
        allow_methods GET POST;
        cgi_pass /usr/bin/php-cgi;
    }

    location *.py {
        allow_methods GET POST;
        cgi_pass /usr/bin/python3;
        upload_store upload;
    }

    location /upload {
        allow_methods POST GET;
    }

    # Redirections
    location /google {
        return 301 https://google.fr;
    }

    location /intra {
        return 301 https://intra.42.fr/;
    }
}
