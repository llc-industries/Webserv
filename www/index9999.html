<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="darkreader-lock">
	<title>Webserv - 9999</title>
	<style>
		:root {
			--base: #1e1e2e;
			--mantle: #181825;
			--crust: #11111b;
			--surface0: #313244;
			--text: #cdd6f4;
			--subtext0: #a6adc8;
			--blue: #89b4fa;
			--teal: #94e2d5;
			--green: #a6e3a1;
			--red: #f38ba8;
		}

		body {
			font-family: monospace;
			background-color: var(--base);
			color: var(--text);
			margin: 40px;
		}

		h1 {
			color: var(--teal);
			border-bottom: 2px solid var(--surface0);
			padding-bottom: 10px;
		}

		h2 {
			color: var(--blue);
			margin-top: 0;
		}

		.container {
			max-width: 800px;
			margin: 0 auto;
		}

		.box {
			background-color: var(--mantle);
			border: 1px solid var(--surface0);
			padding: 20px;
			border-radius: 6px;
			margin-bottom: 20px;
		}

		a {
			color: var(--green);
			text-decoration: none;
		}

		a:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1>Webserv Dashboard</h1>

		<div class="box">
			<h2>Other servers</h2>
			<ul>
				<li><a href="http://localhost:8080/index8080.html">Port 8080 / 8081 : Main</a></li>
				<li><a href="http://localhost:9090/index9090.html">Port 9090 : CGI / POST CGI</a></li>
				<li><a href="http://localhost:9999/index9999.html">Port 9999 : Redirections (You are here)</a></li>
				<li><a href="http://localhost:7777/index7777.html">Port 7777 : Only 413 (10 byte body size)</a></li>
			</ul>
		</div>

		<div class="box">
			<h2>Redirections (301 & 302)</h2>

			<ul>
				<li><a href="/github" target="_blank">GET /github (301 -> github.com)</a></li>
				<li><a href="/google" target="_blank">GET /google (302 -> google.com)</a></li>
			</ul>
		</div>
	</div>
</body>

</html>
